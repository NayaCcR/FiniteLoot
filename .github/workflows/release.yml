name: Release FiniteLoot

on:
  workflow_run:
    workflows:
      - Quick Test FiniteLoot
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag, for example v1.1.1; leave empty to generate it'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-finiteloot
  cancel-in-progress: false

jobs:
  release:
    name: Tag, build, and publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out tested source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: |
          git config core.filemode false
          chmod +x gradlew

      - name: Determine release version
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          built_version="$(./gradlew -q properties | sed -n 's/^version: //p' | tail -n 1)"
          if [[ -z "$built_version" ]]; then
            echo 'Unable to determine the Gradle project version.' >&2
            exit 1
          fi

          release_tag="${INPUT_TAG:-v$built_version}"
          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>: $release_tag" >&2
            exit 1
          fi
          if [[ "${release_tag#v}" != "$built_version" ]]; then
            echo "Version mismatch: tag=${release_tag#v}, plugin=$built_version" >&2
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$built_version" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          git fetch --tags --force

          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            existing_sha="$(git rev-list -n 1 "$RELEASE_TAG^{commit}")"
            if [[ "$existing_sha" != "$source_sha" ]]; then
              echo "Tag $RELEASE_TAG already points to $existing_sha, expected $source_sha." >&2
              exit 1
            fi
            echo "Tag $RELEASE_TAG already points to this source; continuing."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$RELEASE_TAG" "$source_sha"
          git push origin "$RELEASE_TAG"

      - name: Build, test, and check style
        run: ./gradlew clean build --stacktrace

      - name: Validate version and select deployable JAR
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          jar_path="$(find build/libs -maxdepth 1 -type f -name 'FiniteLoot-*.jar' \
            ! -name '*-plain.jar' ! -name '*-sources.jar' -print -quit)"
          if [[ -z "$jar_path" ]]; then
            echo 'No deployable FiniteLoot JAR was produced.' >&2
            exit 1
          fi

          built_version="$(unzip -p "$jar_path" paper-plugin.yml \
            | sed -n "s/^version: '\(.*\)'$/\1/p")"
          if [[ "$built_version" != "${RELEASE_TAG#v}" ]]; then
            echo "Version mismatch: tag=${RELEASE_TAG#v}, plugin=$built_version" >&2
            exit 1
          fi

          echo "jar=$jar_path" >> "$GITHUB_OUTPUT"
          echo "version=$built_version" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FiniteLoot ${{ steps.package.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.jar }}
          fail_on_unmatched_files: true
